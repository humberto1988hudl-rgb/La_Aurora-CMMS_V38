<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA CMMS PRO - V6.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f4f7;
            --sidebar: #1a252f;
            --aurora-red: #e74c3c;
            --aurora-orange: #f39c12;
            --aurora-green: #1abc9c;
            --dimo-blue: #3498db;
            --text-light: #ecf0f1;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        /* --- LOGIN --- */
        #selector-pantalla {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://github.com/humberto1988hudl-rgb/La_Aurora-CMMS/blob/main/mantto.png?raw=true');
            background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card { background: #2d2823; padding: 40px; border-radius: 30px; width: 380px; text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo-login { background: white; width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-login img { width: 238%; }
        .login-input { width: 100%; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: none; text-align: center; font-weight: bold; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; background: var(--aurora-green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* --- SIDEBAR --- */
        #sidebar { width: 260px; background: var(--sidebar); color: var(--text-light); display: none; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { width: 162px; height: 162px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--aurora-green); overflow: hidden; }
        .sidebar-logo img { width: 100%; }
        .nav-menu { flex: 1; padding: 15px 0; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; color: rgba(255,255,255,0.6); cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #2c3e50; color: white; border-left: 4px solid var(--aurora-green); }
        .nav-item i { width: 30px; font-size: 1.1rem; }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .view-section { display: none; padding: 20px; overflow-y: auto; height: 100%; }
        .view-section.active { display: block; }
        
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .stat-value { font-size: 2.2rem; font-weight: 800; display: block; }

        .machine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding-bottom: 30px; }
        
        /* TARJETA */
        .card { 
            background: white; border-radius: 10px; padding: 15px; 
            border-top: 5px solid var(--aurora-green); text-align: center; 
            cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.05); 
            transition: 0.2s; position: relative;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .card.warning { border-top-color: var(--aurora-orange); }
        .card.alert { animation: blink-red 0.8s infinite; border-top-width: 8px; font-weight: bold; }
        @keyframes blink-red { 0%, 100% { background: #fff; border-top-color: var(--aurora-red); } 50% { background: #ffebeb; border-top-color: #c0392b; } }

        /* --- MODAL --- */
        #modal-ot { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 350px; }
    </style>
</head>
<body>

<div id="selector-pantalla">
    <div class="login-card">
        <div class="logo-login"><img src="https://github.com/humberto1988hudl-rgb/La_Aurora-CMMS/blob/main/La%20Aurora%20CMMS.png?raw=true"></div>
        <h2>AURORA CMMS</h2>
        <select id="select-nave" class="login-input">
            <option value="GLOBAL">ACCESO GLOBAL</option>
            <option value="ARENA">ARENA</option>
            <option value="PHOENIX">PHOENIX</option>
        </select>
        <input type="password" id="pass" placeholder="PASSWORD" class="login-input">
        <button onclick="entrar()" class="btn-login">ENTRAR AL PANEL</button>
    </div>
</div>

<nav id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo"><img src="https://github.com/humberto1988hudl-rgb/La_Aurora-CMMS/blob/main/La%20Aurora.png?raw=true"></div>
        <strong>AURORA PRO</strong>
        <div id="clock" style="color:var(--aurora-green); font-size: 0.8rem; margin-top:5px;">00:00:00</div>
    </div>
    <div class="nav-menu">
        <div class="nav-item active" onclick="showSection('dash')"><i class="fas fa-desktop"></i> Dashboard</div>
        <div class="nav-item" onclick="showSection('stats')"><i class="fas fa-chart-bar"></i> Estadísticas</div>
        <div class="nav-item" onclick="showSection('historial')"><i class="fas fa-history"></i> Historial</div>
    </div>
    <div style="padding: 15px;">
        <button class="btn-login" style="margin-bottom:10px; width:100%; font-size: 0.8rem; background: var(--dimo-blue);" onclick="exportarExcel()">
            <i class="fas fa-file-excel"></i> REPORTE EXCEL
        </button>
        <button class="btn-login" style="width:100%; font-size: 0.8rem; background: var(--aurora-red);" onclick="cerrarSesion()">
            <i class="fas fa-power-off"></i> CERRAR SESIÓN
        </button>
    </div>
</nav>

<div id="main-content">
    <div id="section-dash" class="view-section active">
        <div class="stats-container">
            <div class="stat-box" onclick="render('good')"><span id="count-good" class="stat-value">0</span><span>OK</span></div>
            <div class="stat-box" onclick="render('warning')"><span id="count-warning" class="stat-value">0</span><span>50%</span></div>
            <div class="stat-box" onclick="render('danger')"><span id="count-danger" class="stat-value" style="color:var(--aurora-red)">0</span><span>OT</span></div>
        </div>
        <div id="master-container"></div>
    </div>
    <div id="section-stats" class="view-section"><h2>Análisis de Rendimiento</h2></div>
    <div id="section-historial" class="view-section"><h2>Historial de Actividades</h2></div>
</div>

<div id="modal-ot">
    <div class="modal-content">
        <h2 id="ot-name" style="color:var(--aurora-red); margin:0;">EQUIPO</h2>
        <p>Confirmación de Cierre Técnico</p>
        <input type="password" id="pass-ot" placeholder="CLAVE" class="login-input" style="border:1px solid #ccc">
        <button class="btn-login" onclick="ejecutarCierre()">CULMINAR MANTENIMIENTO</button>
        <button class="btn-login" style="background:#ddd; color:#333; margin-top:8px;" onclick="cerrarModal()">CANCELAR</button>
    </div>
</div>

<script>
    let maquinas = [];
    let seleccionado = null;

    function entrar() {
        if(document.getElementById('pass').value === "21705") {
            document.getElementById('selector-pantalla').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            initData();
            render('all');
        } else { alert("Clave incorrecta"); }
    }

    function cerrarSesion() {
        document.getElementById('selector-pantalla').style.display = 'flex';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('pass').value = '';
    }

    function initData() {
        maquinas = [];
        // ARENA
        for(let i=1; i<=48; i++) maquinas.push({id: `PMB-${i}`, nave: 'ARENA', h: Math.floor(Math.random()*2100)});
        for(let i=67; i<=75; i++) maquinas.push({id: `PMB-${i}`, nave: 'ARENA', h: Math.floor(Math.random()*2100)});
        maquinas.push({id: 'COMBINER-1', nave: 'ARENA', h: 2050}, {id: 'COMBINER-2', nave: 'ARENA', h: 400});
        for(let i=1; i<=9; i++) maquinas.push({id: `SCANDIA-${i}`, nave: 'ARENA', h: Math.floor(Math.random()*2500)});
        ['A','B','C','D','F','K'].forEach(l => maquinas.push({id: `SCANDIA-${l}`, nave: 'ARENA', h: Math.floor(Math.random()*2500)}));

        // PHOENIX
        for(let i=49; i<=66; i++) maquinas.push({id: `PMB-${i}`, nave: 'PHOENIX', h: Math.floor(Math.random()*2500)});
        ['H','G','E','I','J','L'].forEach(l => maquinas.push({id: `SCAN-${l}`, nave: 'PHOENIX', h: Math.floor(Math.random()*2500)}));
        maquinas.push({id: `COMBINER-3`, nave: 'PHOENIX', h: Math.floor(Math.random()*2500)});
        maquinas.push({id: `TRIT-3`, nave: 'PHOENIX', h: Math.floor(Math.random()*2500)});
    }

    /* DELEGACIÓN DE EVENTOS PARA MÁQUINAS EN ROJO */
    document.getElementById('master-container').addEventListener('click', function(e) {
        const card = e.target.closest('.card');
        if (card) {
            const id = card.getAttribute('data-id');
            const m = maquinas.find(x => x.id === id);
            if (m && m.h >= 2000) {
                seleccionado = m;
                document.getElementById('ot-name').innerText = m.id;
                document.getElementById('modal-ot').style.display = 'flex';
            }
        }
    });

    function render(filtro) {
        const master = document.getElementById('master-container');
        const naveSel = document.getElementById('select-nave').value;
        master.innerHTML = '';
        
        let counts = {good:0, warning:0, danger:0};
        const naves = (naveSel === 'GLOBAL') ? ['ARENA', 'PHOENIX'] : [naveSel];

        naves.forEach(n => {
            const mNave = maquinas.filter(m => m.nave === n);
            mNave.forEach(m => {
                if(m.h >= 2000) counts.danger++; 
                else if(m.h >= 1000) counts.warning++; 
                else counts.good++;
            });

            const filtradas = (filtro === 'all') ? mNave : mNave.filter(m => 
                (filtro === 'good' && m.h < 1000) || (filtro === 'warning' && m.h >= 1000 && m.h < 2000) || (filtro === 'danger' && m.h >= 2000)
            );

            if(filtradas.length > 0) {
                const head = document.createElement('div');
                head.innerHTML = `<div style="background:#fff; padding:10px; border-left:5px solid var(--dimo-blue); margin:15px 0; font-weight:bold; border-radius:5px;">NAVE: ${n}</div>`;
                const grid = document.createElement('div');
                grid.className = 'machine-grid';
                filtradas.forEach(m => {
                    const card = document.createElement('div');
                    card.className = `card ${m.h >= 2000 ? 'alert' : (m.h >= 1000 ? 'warning' : '')}`;
                    card.setAttribute('data-id', m.id);
                    card.innerHTML = `<strong>${m.id}</strong><br><small>${m.h} hrs</small>`;
                    grid.appendChild(card);
                });
                head.appendChild(grid);
                master.appendChild(head);
            }
        });
        document.getElementById('count-good').innerText = counts.good;
        document.getElementById('count-warning').innerText = counts.warning;
        document.getElementById('count-danger').innerText = counts.danger;
    }

    function ejecutarCierre() {
        if(document.getElementById('pass-ot').value === "1903") {
            const m = seleccionado;
            
            // Cuerpo del correo formal
            const asunto = `MANTENIMIENTO PREVENTIVO EXITOSA - ${m.id}`;
            const cuerpoMail = `Estimados Gerentes, Directores y Equipo de Operaciones:\n\nPor medio del presente, el departamento de Mantenimiento les informa que se ha completado con éxito el Mantenimiento Preventivo programado para la siguiente unidad:\nSe confirma que el Mantenimiento Preventivo de la Máquina ${m.id} ha CULMINADO EXITOSAMENTE.\n\nEquipo:${m.id}\nUbicación:${m.nave}\nEstado: Operativo 100%\nHoras Reseteadas: 0\n\nResultados de la Intervención:

1. Se realizaron todas las tareas de inspección, lubricación y ajustes técnicos según el protocolo de seguridad.
2. El equipo ha sido sometido a pruebas de funcionamiento en vacío, respondiendo de manera satisfactoria y cumpliendo con los estándares de calidad requeridos.
3. El contador de horas ha sido reiniciado en el sistema CMMS PRO para el inicio del nuevo ciclo.

A partir de este momento, la máquina queda a disposición del equipo de producción para retomar sus labores habituales de forma segura y eficiente.

Agradecemos la coordinación previa para permitir esta ventana de mantenimiento, la cual asegura la confiabilidad de nuestros procesos industriales.

Atentamente,

[Firma Jedrik Peña]
Departamento de Mantenimiento
Aurora CMMS PRO,.`;
            
            // MÉTODO MODERNO: Abre el cliente de correo en una ventana/pestaña nueva (_blank)
            const mailtoUrl = `mailto:Humberto1988hudl@gmail.com?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpoMail)}`;
            window.open(mailtoUrl, '_blank');
            
            // Reset de horas en el sistema
            m.h = 0;

            // Mensaje de Excelencia
            alert(`🌟 EXCELENTE TRABAJO TÉCNICO 🌟\n\nLa culminación del mantenimiento preventivo del equipo ${m.id} ha sido exitosa.\n\nEl sistema ha reseteado las horas y notificado a gerencia.`);

            cerrarModal();
            render('all');
        } else { 
            
            alert("❌ Clave técnica incorrecta."); }
    }

    function showSection(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('section-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function cerrarModal() { document.getElementById('modal-ot').style.display = 'none'; document.getElementById('pass-ot').value = ''; }
    function exportarExcel() { const ws = XLSX.utils.json_to_sheet(maquinas); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "Reporte_Aurora.xlsx"); }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
